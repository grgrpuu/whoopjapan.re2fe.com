<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抽選結果</title>

<style>
body{
  margin:0;
  background:#f3f3f3;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  color:#222;
}

.container{
  width:84%;
  max-width:360px;
  margin:0 auto;
  padding-top:24px;
  padding-bottom:36px;
}

.store{
  text-align:center;
  color:#d91f2d;
  font-size:24px;
  font-weight:700;
  margin-bottom:48px;
}

.result{
  text-align:center;
  font-size:24px;
  font-weight:300;
  line-height:33.6px;
  margin:0 0 20px 0;
  color:#222;
}

.win{
  font-size:20px;
  padding:14px 0;
  margin-bottom:22px;
}

.event{
  color:rgb(0, 204, 255);
  font-size:24px;
  font-weight:700;
  line-height:33.6px;
  margin:10px 0 16px 0;
}

.name{
  font-size:26px;
  font-weight:700;
  margin-bottom:26px;
}

.row{
  display:flex;
  color:#666;
  font-size:18px;
  line-height:1.55;
  margin-bottom:6px;
}

.label{
  width:132px;
  flex-shrink:0;
  white-space:nowrap;
}

.value{
  flex:1;
  word-break:normal;
  overflow-wrap:break-word;
}

.code-line-2{
  padding-left:132px;
  margin-top:2px;
}

.note{
  font-size:17px;
  margin-top:44px;
  margin-bottom:22px;
}

.date{
  font-size:18px;
  margin-bottom:18px;
}

.sub{
  font-size:16px;
  margin-bottom:28px;
}

.btn{
  width:100%;
  border:none;
  border-radius:3px;
  background:rgb(204, 204, 204);
  color:#000;
  font-size:24px;
  font-weight:700;
  line-height:48px;
  height:48px;
  padding:0 32px;
  box-sizing:border-box;
}

.link{
  margin-top:24px;
  font-size:17px;
}
</style>
</head>
<body>

<div class="container">

  <div class="store">Whoop Japan Store</div>

  <div class="result">抽選結果</div>

  <div class="win">当選しました</div>

  <div class="event">
    個別ハイタッチ会<br>
    【JONGSEOB】
  </div>

  <div class="name">原 はづき 様</div>

  <div class="row">
    <div class="label">イベント：</div>
    <div class="value">[P1Harmony] 5/29(金)東京2部</div>
  </div>

  <div class="row">
    <div class="label">応募コード：</div>
    <div class="value">019d518c-f807-77be-84e9-</div>
  </div>

  <div class="row code-line-2">64f9d6a17d9f</div>

  <div class="note">
    こちらの画面をスマートフォンで<br>
    ブックマークすることをおすすめします。
  </div>

  <div class="date">表示開始時刻（01/01 00:00）予定</div>

  <div class="sub">
    時刻が未定の場合もございます。開催日時はイベント詳細ページをご確認ください。
  </div>

  <button id="confirmBtn" class="btn">確認</button>

  <a href="result-list.html" class="link">抽選結果一覧へ</a>

</div>

<script>
document.getElementById("confirmBtn").addEventListener("click", function(){
  this.classList.add("used");
  this.textContent = "使用済み";
});
</script>

</body>
</html>
