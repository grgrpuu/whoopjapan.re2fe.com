<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抽選結果</title>

<style>
body{
  margin:0;
  background:#f3f3f3;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  color:#222;
}

.container{
  width:min(86vw, 760px);
  margin:0 auto;
  padding:28px 0 42px;
  box-sizing:border-box;
}

.store{
  text-align:center;
  color:#d91f2d;
  font-size:26px;
  font-weight:700;
  margin:0 0 54px;
}

.result{
  text-align:center;
  font-size:24px;
  font-weight:300;
  line-height:1.4;
  margin:0 0 34px;
}

.win{
  border:1px solid #d91f2d;
  border-radius:4px;
  color:#d91f2d;
  text-align:center;
  font-size:22px;
  font-weight:700;
  padding:18px 0;
  margin:0 0 28px;
}

.event{
  color:#17c8f7;
  font-size:24px;
  font-weight:700;
  line-height:1.4;
  margin:0 0 20px;
}

.name{
  font-size:28px;
  font-weight:700;
  margin:0 0 28px;
}

.row{
  display:grid;
  grid-template-columns: 118px 1fr;
  column-gap:14px;
  align-items:start;
  color:#666;
  font-size:18px;
  line-height:1.55;
  margin-bottom:8px;
}

.label{
  white-space:nowrap;
}

.value{
  min-width:0;
  word-break:keep-all;
  overflow-wrap:anywhere;
}

.code-line-2{
  margin-left:132px;
  margin-top:2px;
  color:#666;
  font-size:18px;
  line-height:1.55;
}

.note{
  text-align:center;
  color:#666;
  font-size:18px;
  line-height:1.6;
  margin:42px 0 26px;
}

.date{
  text-align:center;
  color:#ef5b86;
  font-size:18px;
  font-weight:700;
  margin:0 0 18px;
}

.sub{
  text-align:center;
  color:#666;
  font-size:16px;
  line-height:1.55;
  margin:0 0 30px;
}

.btn{
  width:100%;
  height:66px;
  border:none;
  border-radius:4px;
  background:#d0d0d0;
  color:#000;
  font-size:24px;
  font-weight:700;
  cursor:pointer;
}

.btn.used{
  background:#d91f2d;
  color:#fff;
}

.link{
  display:block;
  text-align:center;
  margin-top:26px;
  font-size:18px;
  color:#3aa0ff;
  text-decoration:none;
}
</style>
</head>
<body>

<div class="container">

  <div class="store">Whoop Japan Store</div>

  <div class="result">抽選結果</div>

  <div class="win">当選しました</div>

  <div class="event">
    個別ハイタッチ会<br>
    【JONGSEOB】
  </div>

  <div class="name">原 はづき 様</div>

  <div class="row">
    <div class="label">イベント：</div>
    <div class="value">[P1Harmony] 5/29(金)東京2部</div>
  </div>

<div class="row">
  <div class="label">応募コード：</div>
  <div class="value">019d518c-f807-77be-84e9-</div>
</div>
<div class="code-line-2">64f9d6a17d9f</div>
  
  <div class="note">
    こちらの画面をスマートフォンで<br>
    ブックマークすることをおすすめします。
  </div>

  <div class="date">表示開始時刻（01/01 00:00）予定</div>

  <div class="sub">
    時刻が未定の場合もございます。開催日時はイベント詳細ページをご確認ください。
  </div>

  <button id="confirmBtn" class="btn">確認</button>

  <a href="result-list.html" class="link">抽選結果一覧へ</a>

</div>

<script>
document.getElementById("confirmBtn").addEventListener("click", function(){
  this.classList.add("used");
  this.textContent = "使用済み";
});
</script>

</body>
</html>
