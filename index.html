<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抽選結果</title>

<style>
body{
  margin:0;
  background:#f3f3f3;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  color:#222;
}

.container{
  width:84%;
  max-width:390px;
  margin:0 auto;
  padding-top:28px;
  padding-bottom:40px;
}

.store{
  text-align:center;
  color:#d91f2d;
  font-size:29px;
  font-weight:700;
  margin-bottom:58px;
}

.result{
  text-align:center;
  font-size:24px;
  font-weight:300;
  line-height:33.6px;
  margin:0 0 20px 0;
  color:#222;
}

.win{
  border:1px solid #d91f2d;
  border-radius:4px;
  color:#d91f2d;
  text-align:center;
  font-size:24px;
  font-weight:700;
  padding:18px 0;
  margin-bottom:28px;
}

.event{
  color:rgb(0, 204, 255);
  font-size:24px;
  font-weight:700;
  line-height:33.6px;
  margin:10px 0 10px 0;
  text-align:left;
}
  
.name{
  font-size:31px;
  font-weight:700;
  color:#111;
  margin-bottom:34px;
}

.row{
  display:flex;
  color:#666;
  font-size:22px;
  line-height:1.55;
  margin-bottom:6px;
}

.label{
  width:118px;
  flex-shrink:0;
}

.value{
  flex:1;
}

.code-line-2{
  padding-left:118px;
  margin-top:4px;
}

.note{
  text-align:center;
  color:#666;
  font-size:19px;
  line-height:1.75;
  margin-top:56px;
  margin-bottom:28px;
}

.date{
  text-align:center;
  color:#ef5d8e;
  font-size:21px;
  font-weight:700;
  margin-bottom:24px;
}

.sub{
  text-align:center;
  color:#666;
  font-size:18px;
  line-height:1.6;
  margin-bottom:34px;
}

.btn{
  width:100%;
  border:none;
  border-radius:3px;
  background:rgb(204, 204, 204);
  color:#000;
  font-size:24px;
  font-weight:700;
  line-height:53px;
  height:53px;
  padding:0 40px;
  text-align:center;
  cursor:pointer;
  box-sizing:border-box;
}

.btn.used{
  background:#d91f2d;
  color:#fff;
}

.link{
  display:block;
  text-align:center;
  margin-top:30px;
  color:#2d8cff;
  text-decoration:none;
  font-size:19px;
}
</style>
</head>
<body>

<div class="container">

  <div class="store">Whoop Japan Store</div>

  <div class="result">抽選結果</div>

  <div class="win">当選しました</div>

  <div class="event">
    個別ハイタッチ会<br>
    【JONGSEOB】
  </div>

  <div class="name">原 はづき 様</div>

  <div class="row">
    <div class="label">イベント：</div>
    <div class="value">[P1Harmony] 5/29(金)東京2部</div>
  </div>

  <div class="row">
    <div class="label">応募コード：</div>
    <div class="value">019d518c-f807-77be-84e9-</div>
  </div>

  <div class="row code-line-2">64f9d6a17d9f</div>

  <div class="note">
    こちらの画面をスマートフォンで<br>
    ブックマークすることをおすすめします。
  </div>

  <div class="date">表示開始時刻（01/01 00:00）予定</div>

  <div class="sub">
    時刻が未定の場合もございます。開催日時はイベント詳細ページをご確認ください。
  </div>

  <button id="confirmBtn" class="btn">確認</button>

  <a href="result-list.html" class="link">抽選結果一覧へ</a>

</div>

<script>
document.getElementById("confirmBtn").addEventListener("click", function(){
  this.classList.add("used");
  this.textContent = "使用済み";
});
</script>

</body>
</html>
