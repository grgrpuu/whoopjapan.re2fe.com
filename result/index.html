<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whoop Japan Store - 抽選結果一覧</title>
    <style>
        :root {
            --bg-color: #f9f9f9;
            --text-main: #333;
            --text-sub: #888;
            --card-bg: #fdf2f2; /* 薄いピンクベージュ */
            --border-radius: 8px;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        /* ヘッダー部分 */
        .store-name {
            color: #e60012; /* 赤色 */
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .page-title {
            font-size: 1.3rem;
            color: #444;
            margin-bottom: 15px;
        }

        .instruction {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        /* セレクトボックス */
        .event-selector {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 30px;
            background-color: #fff;
        }

        /* 抽選結果カード */
        .result-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .result-item {
            display: flex;
            align-items: center;
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 15px;
            text-decoration: none; /* リンクの下線を消す */
            color: inherit;
            box-shadow: var(--shadow);
            position: relative;
            transition: transform 0.1s;
        }

        .result-item:active {
            transform: scale(0.98); /* タップ時に少し沈む演出 */
        }

        /* 「未使用」スタンプ */
        .status-badge {
            background-color: #e5989b;
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            position: absolute;
            top: 10px;
            left: 10px;
        }

        .check-icon {
            width: 40px;
            height: 40px;
            border: 2px solid #ddd;
            border-radius: 50%;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ddd;
            font-size: 1.2rem;
        }

        /* コンテンツ部分 */
        .content {
            flex-grow: 1;
            text-align: left;
        }

        .label {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .label-blue { color: #007bff; }
        .label-green { color: #28a745; }
        .label-red { color: #dc3545; }

        .uuid {
            font-size: 0.75rem;
            color: var(--text-sub);
            word-break: break-all;
        }

        /* 矢印アイコン */
        .arrow {
            color: #666;
            font-size: 1.5rem;
            margin-left: 10px;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="store-name">Whoop Japan Store</div>
    <div class="page-title">抽選結果一覧</div>
    <div class="instruction">
        こちらの画面をスマートフォンで<br>
        ブックマークすることをおすすめします。
    </div>

    <select class="event-selector">
        <option>[P1Harmony] 5/30(土)東京2部</option>
    </select>

    <div class="result-list">
        <a href="#" class="result-item">
            <span class="status-badge">未使用</span>
            <div class="check-icon">✓</div>
            <div class="content">
                <div class="label">当選：<span class="label-blue">個別ハイタッチ会【THEO】</span></div>
                <div class="uuid">019d5178-c7e8-7780-8c27-4e3695922b42</div>
            </div>
            <div class="arrow">＞</div>
        </a>

        <a href="#" class="result-item">
            <span class="status-badge">未使用</span>
            <div class="check-icon">✓</div>
            <div class="content">
                <div class="label">当選：<span class="label-green">個別ハイタッチ会【INTAK】</span></div>
                <div class="uuid">019d515c-1584-774a-9eaf-3812d8cacae7</div>
            </div>
            <div class="arrow">＞</div>
        </a>

        <a href="#" class="result-item">
            <span class="status-badge">未使用</span>
            <div class="check-icon">✓</div>
            <div class="content">
                <div class="label">当選：<span class="label-red">個別フォトカードお渡し会【KEEHO】</span></div>
                <div class="uuid">019d533b-f74c-71b0-8beb-a0871ba2bf75</div>
            </div>
            <div class="arrow">＞</div>
        </a>
    </div>
</div>

</body>
</html>
