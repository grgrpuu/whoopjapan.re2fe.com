<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抽選結果一覧</title>
    
    <style>
        :root {
            --bg-color: #f9f9f9;
            --text-main: #333;
            --text-sub: #888;
            --text-gray: #666;
            --card-bg: #fdf2f2;
            --border-radius: 6px;
            --shadow: 0 2px 4px rgba(0,0,0,0.08);
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container{
  width:86.7%;
  max-width:390px;
  margin:0 auto;
  padding-top:27px;
  padding-bottom:40px;
}

.store-title{
  text-align:center;
  color:#EC0127;
  font-size:20px;
  font-weight:700;
  letter-heihgt:24px;
  margin-bottom:28px;
}

        .page-title {
            font-size: 1.1rem;
            color: #444;
            margin-bottom: 10px;
        }

        .instruction {
            font-size: 0.8rem;
            color: var(--text-gray);
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .event-selector {
            width: 100%;
            padding: 8px 10px;
            font-size: 0.9rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 20px;
            background-color: #fff;
            color: var(--text-gray);
        }

        .result-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .result-item {
            display: flex;
            align-items: center;
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 12px 12px 10px 12px;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--shadow);
            position: relative;
            transition: transform 0.1s;
        }

        .status-badge {
            background-color: #e5989b;
            color: white;
            font-size: 0.6rem;
            padding: 1px 6px;
            border-radius: 10px;
            position: absolute;
            top: 5px;
            left: 5px;
            z-index: 2;
        }

        /* 修正：丸はグレー、チェックはボタンの背景色と同じピンクベージュ */
        .check-icon {
            width: 32px;
            height: 32px;
            background-color: #ddd;
            border-radius: 50%;
            margin-right: 12px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--card-bg);
            font-size: 1.2rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        .content {
            flex-grow: 1;
            text-align: left;
            margin-top: 5px;
        }

        .label {
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 2px;
            display: block;
        }

        .label-blue { color: #007bff; }
        .label-green { color: #28a745; }
        .label-red { color: #dc3545; }

        .uuid {
            font-size: 0.7rem;
            color: var(--text-sub);
            line-height: 1.2;
            display: block;
        }

        .arrow {
            color: #999;
            font-size: 1.1rem;
            margin-left: 5px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="container">
  <div class="store-title">Whoop Japan Store</div>
  <div class="page-title">抽選結果一覧</div>
    <div class="instruction">
        こちらの画面をスマートフォンで<br>
        ブックマークすることをおすすめします。
    </div>

    <select class="event-selector">
        <option>[P1Harmony] 5/30(土)東京2部</option>
    </select>

    <div class="result-list">
        <a href="#" class="result-item">
            <span class="status-badge">未使用</span>
            <div class="check-icon">✓</div>
            <div class="content">
                <span class="label">当選：<span class="label-blue">個別ハイタッチ会【THEO】</span></span>
                <span class="uuid">019d5178-c7e8-7780-8c27-<br>4e3695922b42</span>
            </div>
            <div class="arrow">＞</div>
        </a>

        <a href="#" class="result-item">
            <span class="status-badge">未使用</span>
            <div class="check-icon">✓</div>
            <div class="content">
                <span class="label">当選：<span class="label-green">個別ハイタッチ会【INTAK】</span></span>
                <span class="uuid">019d515c-1584-774a-9eaf-<br>3812d8cacae7</span>
            </div>
            <div class="arrow">＞</div>
        </a>

        <a href="#" class="result-item">
            <span class="status-badge">未使用</span>
            <div class="check-icon">✓</div>
            <div class="content">
                <span class="label">当選：<span class="label-red">個別フォトカードお渡し会【KEEHO】</span></span>
                <span class="uuid">019d533b-f74c-71b0-8beb-<br>a0871ba2bf75</span>
            </div>
            <div class="arrow">＞</div>
        </a>
    </div>
</div>

</body>
</html>
